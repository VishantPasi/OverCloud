  <line x1="12" y1="36" x2="50" y2="36" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="12" y1="44" x2="50" y2="44" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Grid lines vertical -->
  <line x1="25" y1="20" x2="25" y2="54" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <line x1="38" y1="20" x2="38" y2="54" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
