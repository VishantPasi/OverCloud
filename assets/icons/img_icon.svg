    <!-- Image frame -->
    <rect x="22" y="104" width="156" height="118" rx="12" fill="rgba(255,255,255,0.12)" style="fill:rgba(255, 255, 255, 0.12);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

